# API (Go/Gin) + admin dashboard (Next.js). Use this on Coolify: New Resource → Docker Compose → point to this file.
#
# Before first deploy:
# 1. Copy .env.example → .env and set GOOSE_DBSTRING, JWT_SECRET, and the variables below.
# 2. Set NEXT_PUBLIC_API_URL to your *public* API base including /v1 (must match how browsers reach the API).
#    Example: https://api.yourdomain.com/v1  (Coolify: assign a domain to the `api` service, use that URL)
# 3. Set AUTH_URL to your dashboard URL (same origin you open in the browser), e.g. https://app.yourdomain.com
#
# Coolify: add Build Arguments / Environment for service `web` for NEXT_PUBLIC_* (build-time) and AUTH_SECRET, AUTH_URL (runtime).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Local: copy `.env.example` → `.env`. Coolify: variables from the UI are injected; `.env` is optional.
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: "5000"
    ports:
      - "${API_PUBLISH_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5000/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL to your public API base e.g. https://api.example.com/v1}
        NEXT_PUBLIC_APP_KEY: ${NEXT_PUBLIC_APP_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # NextAuth v5 — required in production
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET e.g. openssl rand -base64 32}
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL to the dashboard public URL e.g. https://app.example.com}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
