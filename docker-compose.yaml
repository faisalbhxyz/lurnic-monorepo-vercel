# Go API (`api`) + Next.js (`web`). MySQL is NOT bundled — use a third-party / managed DB.
#
# Set GOOSE_DBSTRING in `.env` to your MySQL host (e.g. RDS, PlanetScale-compatible via MySQL,
# `host.docker.internal:3306` if MySQL runs on the Docker host, or any `tcp(host:port)` DSN).
#
# Optional local MySQL in Docker: merge `docker-compose.mysql.yaml` (see that file).
#
# Prerequisites: Docker Compose v2.24+ (for `env_file` + `required: false`) or ensure `.env` exists.
#
# Quick start (repo root):
#   cp .env.example .env
#   # Set JWT_SECRET, AUTH_SECRET, GOOSE_DBSTRING (external MySQL), NEXT_PUBLIC_API_URL, AUTH_URL
#   docker compose up --build -d
#   API: http://localhost:${API_PUBLISH_PORT:-5000}  |  UI: http://localhost:${WEB_PUBLISH_PORT:-3000}
#
# Coolify:
# - Resource type: Docker Compose. Set GOOSE_DBSTRING to your external MySQL DSN in the UI.
# - Two domains: API → 5000, Web → 3000. Rebuild `web` after changing NEXT_PUBLIC_*.
# - Build context issues (lstat .../frontend): set BUILD_SOURCE_CONTEXT=https://github.com/ORG/REPO.git#branch

name: lurnic

networks:
  lurnic:
    driver: bridge

services:
  api:
    build:
      context: ${BUILD_SOURCE_CONTEXT:-.}
      dockerfile: Dockerfile
    pull_policy: never
    restart: unless-stopped
    networks:
      - lurnic
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: "5000"
      GIN_MODE: ${GIN_MODE:-release}
      GOOSE_DRIVER: mysql
      GOOSE_MIGRATION_DIR: /app/migrations
      GOOSE_DBSTRING: ${GOOSE_DBSTRING:?Set GOOSE_DBSTRING in .env to your MySQL DSN (e.g. user:pass@tcp(db.example.com:3306)/dbname?charset=utf8mb4&parseTime=True&loc=UTC)}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET (e.g. openssl rand -base64 48)}
    ports:
      - "${API_PUBLISH_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5000/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s

  web:
    build:
      context: ${BUILD_SOURCE_CONTEXT:-.}
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL to your public API base e.g. https://api.example.com/v1}
        NEXT_PUBLIC_APP_KEY: ${NEXT_PUBLIC_APP_KEY:-}
    pull_policy: never
    restart: unless-stopped
    networks:
      - lurnic
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      API_INTERNAL_URL: "http://api:5000/v1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL to your public API base e.g. https://api.example.com/v1}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET e.g. openssl rand -base64 32}
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL to the dashboard public URL e.g. https://app.example.com}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
