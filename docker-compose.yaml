# Full stack: Go API + Next.js dashboard.
#
# Coolify (required for dashboard):
# 1. New resource → Docker Compose (do NOT use "Application" / Nixpacks for this repo if you want the UI).
# 2. Repository: this repo, branch: master.
# 3. Compose file: docker-compose.yaml (Coolify default path).
# 4. Create TWO domains in the UI:
#    - attach one FQDN to service `api` (container port 5000) → use that origin in NEXT_PUBLIC_API_URL + /v1
#    - attach one FQDN to service `web` (container port 3000) → set AUTH_URL to this URL (https)
# 5. Set shared/build env (see .env.example): NEXT_PUBLIC_API_URL, AUTH_SECRET, AUTH_URL, plus API DB/JWT vars.
# 6. Deploy / rebuild so `web` rebuilds with NEXT_PUBLIC_* baked in.
#
# Local: copy .env.example → .env, then: docker compose -f docker-compose.yaml up --build

name: lurnic

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # Coolify/other hosts often run `docker compose pull` first; without this, Compose may try to
    # pull non-existent images named like the service (api/web) from Docker Hub and fail.
    pull_policy: never
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: "5000"
    ports:
      - "${API_PUBLISH_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5000/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL to your public API base e.g. https://api.example.com/v1}
        NEXT_PUBLIC_APP_KEY: ${NEXT_PUBLIC_APP_KEY:-}
    pull_policy: never
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET e.g. openssl rand -base64 32}
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL to the dashboard public URL e.g. https://app.example.com}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
